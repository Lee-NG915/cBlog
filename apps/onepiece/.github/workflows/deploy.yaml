name: Deploy

on:
  workflow_call:
    inputs:
      app_env:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      app_country:
        required: true
        type: string
      env:
        required: true
        type: string
      s3region:
        required: true
        type: string
      bucket:
        required: true
        type: string
      auto_merge:
        type: boolean
env:
  DEPLOYMENT_REPOSITORY: castlery/onepiece-deployment

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    # These permissions are needed to interact with GitHub's OIDC Token endpoint.
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build assets
        uses: actions/download-artifact@v4
        with:
          name: build-assets
          path: ./static

      - name: ls .&static
        run: |
          ls -al ./static

      # - name: get deploy region
      #   uses: mikefarah/yq@master
      #   id: deployment_region
      #   with:
      #     cmd: |
      #       yq '.deployment[0].region' ./deploy/onepiece2/deployment-${{ inputs.app_env }}.yaml

      # - name: get deploy bucket
      #   uses: mikefarah/yq@master
      #   id: deployment_bucket
      #   with:
      #     cmd: |
      #       yq '.deployment[0].bucket' ./deploy/onepiece2/deployment-${{ inputs.app_env }}.yaml

      # - name: log region&bucket
      #   run: |
      #     echo "deployment_config: ${{ steps.deployment_region.outputs.result }}"
      #     echo "deployment_config: ${{ steps.deployment_bucket.outputs.result }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEPLOYER }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEPLOYER }}
          aws-region: ${{ inputs.s3region }}

      - name: Upload assets to S3
        run: |
          aws s3 sync ./static/onepiece/ s3://${{ inputs.bucket }}/assets/onepiece --metadata cache-control=31536000
        # aws s3 sync ./static/mobile/ s3://${{ inputs.bucket }}/assets/mobile --metadata cache-control=31536000

  # https://argocd.cslr.io/applications?showFavorites=false&proj=&sync=&health=&namespace=&cluster=&labels=
  trigger-argocd:
    runs-on: ubuntu-latest
    needs: upload-assets
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEPLOYMENT_REPOSITORY }}
          token: ${{ secrets.GH_PAT_BOT }}
          # ref: master

      - name: Update image version in deployment repo
        id: update_yaml
        uses: fjogeleit/yaml-update-action@main
        with:
          valueFile: 'applications/onepiece/values/${{ inputs.env  }}/${{ inputs.app_country }}.yaml'
          commitChange: false
          updateFile: true
          changes: |
            {
              "image.tag": "${{inputs.app_env}}_${{ inputs.image_tag }}",
              "image.version": "${{ inputs.image_tag }}"
            }

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT_BOT }}
          commit-message: Update deployment image version
          branch: deployment/patch-${{ inputs.app_env }}-${{ inputs.image_tag }}
          branch-suffix: timestamp
          delete-branch: true
          title: '[automerge] Update ${{ inputs.app_env }} version to ${{ inputs.image_tag}}'
          labels: |
            automerge

      # - uses: peter-evans/enable-pull-request-automerge@v3
      #   with:
      #     repository: ${{ env.DEPLOYMENT_REPOSITORY }}
      #     token: ${{ secrets.GH_PAT_BOT }}
      #     pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
      #     merge-method: squash

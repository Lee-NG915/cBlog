web:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
  ingress:
    enabled: true
    annotations:
      # share a single ALB with all ingress rules with group
      alb.ingress.kubernetes.io/group.name: onepiece-group-us-uat
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
      # waf, only works for regional waf
      alb.ingress.kubernetes.io/waf-acl-id: 41697cac-dcc9-44dd-a880-1e586a976ab2
      # prod-vpc-use1-alb_sg
      alb.ingress.kubernetes.io/security-groups: sg-0f257777ccc1e7b4b
      # tls certificate for .co, .com, and .com.au
      alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:825303761615:certificate/ed3dfc29-01ea-428d-919f-97760c4e7942
      alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS-1-2-2017-01
      alb.ingress.kubernetes.io/healthcheck-path: /health
      alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '10'
      alb.ingress.kubernetes.io/load-balancer-attributes: routing.http2.enabled=true,routing.http.drop_invalid_header_fields.enabled=true,waf.fail_open.enabled=true,access_logs.s3.enabled=true,access_logs.s3.bucket=alb-log-waf-onepiece-us-230,access_logs.s3.prefix=onepiece-group-us-uat
      alb.ingress.kubernetes.io/ssl-redirect: '443'
    hosts:
      - host: www-uat.castlery.co
        paths:
          - '/*'
      - host: www-uat.castlery.com
        paths:
          - '/*'
      - host: www-uat.castlery.com.au
        paths:
          - '/*'
      - host: www-uat.castlery.sg
        paths:
          - '/*'

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "onepiece.web.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "onepiece.web.name" . }}
    helm.sh/chart: {{ include "onepiece.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    tags.datadoghq.com/env: {{ .Values.datadog.env }}
    tags.datadoghq.com/service: {{ .Values.datadog.service }}
    tags.datadoghq.com/version: {{ .Values.datadog.version }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "onepiece.web.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "onepiece.web.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        tags.datadoghq.com/env: {{ .Values.datadog.env }}
        tags.datadoghq.com/service: {{ .Values.datadog.service }}
        tags.datadoghq.com/version: {{ .Values.datadog.version }}
        {{- if .Values.podLabels }}
        {{- toYaml .Values.podLabels | nindent 8 }}
        {{- end }}
      annotations:
        ad.datadoghq.com/nginx.logs: >-
          [{
            "source": "nginx"
          }]
        {{- if .Values.podAnnotations }}
        {{- toYaml .Values.podAnnotations | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: 60
      {{ if semverCompare ">=1.19-0" .Capabilities.KubeVersion.GitVersion }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/instance
                operator: In
                values:
                  - {{ .Release.Name }}
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - {{ include "onepiece.web.name" . }}
      {{ end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - {{ .Release.Name }}
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - {{ include "onepiece.web.name" . }}
      containers:
        - name: mobile
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/docker-entrypoint.mobile.sh"]
          {{- if .Values.extraEnvs }}
          env:
            {{ toYaml .Values.extraEnvs | nindent 12 }}
          {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 30"]
          ports:
            - name: http-mobile
              containerPort: 8000
              protocol: TCP
            - name: http-desktop
              containerPort: 9000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http-mobile
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http-mobile
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
        - name: desktop
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/docker-entrypoint.desktop.sh"]
          env:
          {{- if .Values.extraEnvs }}
            {{ toYaml .Values.extraEnvs | nindent 12 }}
          {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 30"]
          ports:
            - name: http-mobile
              containerPort: 8000
              protocol: TCP
            - name: http-desktop
              containerPort: 9000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http-desktop
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http-desktop
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}-nginx"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 30"]
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: health
              containerPort: 1025
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 100m
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

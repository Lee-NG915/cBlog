web:
  resources:
    requests:
      memory: 768Mi
      cpu: 100m
    limits:
      memory: 1.5Gi
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
  ingress:
    enabled: true
    annotations:
      # share a single ALB with all ingress rules with group
      alb.ingress.kubernetes.io/group.name: onepiece-group-au-prod
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
      # waf, only works for regional waf
      alb.ingress.kubernetes.io/waf-acl-id: 6abf14de-4bc9-4da4-a0fd-0824a1b8d967
      # prod-vpc-apse2-alb_sg
      alb.ingress.kubernetes.io/security-groups: sg-01e0d365448da94b8
      # tls certificates for .com.au, .com
      alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-southeast-2:825303761615:certificate/edd249ae-5b6f-4389-ad08-d8f14f7a7f39
      alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS-1-2-2017-01
      alb.ingress.kubernetes.io/healthcheck-path: /health
      alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '10'
      alb.ingress.kubernetes.io/load-balancer-attributes: routing.http2.enabled=true,routing.http.drop_invalid_header_fields.enabled=true,waf.fail_open.enabled=true,access_logs.s3.enabled=true,access_logs.s3.bucket=alb-log-waf-onepiece-au-230,access_logs.s3.prefix=onepiece-group-au-test
      alb.ingress.kubernetes.io/ssl-redirect: '443'
    hosts:
      - host: www.castlery.com
        paths:
          - '/*'
      - host: www3.castlery.com
        paths:
          - '/*'

name: CI

on:
  workflow_call:
    inputs:
      app-env:
        description: 'The app environment'
        required: true
        type: string
      base-branch:
        description: 'The base branch for nx affected'
        required: false
        type: string
      last-successful-event:
        description: 'The last successful event for nx affected'
        required: false
        type: string
      get-affected-projects:
        description: 'Get affected projects'
        required: false
        type: boolean
        default: true
      secret-name:
        description: 'AWS Sectret Name'
        required: false
        type: string
    outputs:
      affected_projects:
        description: 'The affected projects'
        value: ${{ jobs.GET-AFFECTED-APPS.outputs.affected_projects }}
      affected_apps:
        description: 'The affected apps'
        value: ${{ jobs.GET-AFFECTED-APPS.outputs.affected_apps }}
      affected_projects_version:
        description: 'The affected projects version'
        value: ${{ jobs.GET-AFFECTED-APPS.outputs.affected_projects_version }}

env:
  ## docs: https://nx.dev/nx-api/nx/documents/run-many
  ## for example: nx run-many -t=build -p pos web
  PROJECTS: joyboy

jobs:
  GET-AFFECTED-APPS:
    if: ${{ inputs.get-affected-projects }}
    runs-on: ubuntu-latest
    outputs:
      affected_projects: ${{ steps.get-affected-projects.outputs.affected_projects || '[]' }}
      affected_projects_version: ${{ steps.get-affected-projects.outputs.affected_projects_version }}
      affected_apps: ${{ steps.get-affected-projects.outputs.affected_apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install
        uses: ./.github/workflows/actions/install

      - name: Get affected projects
        id: get-affected-projects
        uses: ./.github/workflows/actions/get-affected-projects
        with:
          main-branch: ${{ inputs.base-branch || github.ref_name }}
          last-successful-event: ${{ inputs.last-successful-event || 'push' }}

  CI:
    runs-on: ubuntu-latest
    needs: [GET-AFFECTED-APPS]
    if: ${{ needs.GET-AFFECTED-APPS.outputs.affected_apps != '[]' }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.GET-AFFECTED-APPS.outputs.affected_apps) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install
        uses: ./.github/workflows/actions/install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_BUILDER }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_BUILDER }}
          aws-region: ap-southeast-1

      - name: build
        uses: ./.github/workflows/actions/build
        if: ${{ steps.get-affected-projects.outputs.affected_apps != '[]'}}
        with:
          app-env: ${{ inputs.app-env }}
          # projects: ${{env.PROJECTS}} ## this will assign by the affected apps
          projects: ${{ matrix.project }}
          secret-name: ${{ inputs.secret-name }}

      - name: Uploading artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{inputs.app-env}}-${{ matrix.project }}-build-results
          path: |
            dist/
            !dist/**/.next/cache
            !dist/**/.playwright
            !dist/**/node_modules
          retention-days: 7
          # https://github.com/actions/upload-artifact/pull/608
          include-hidden-files: true

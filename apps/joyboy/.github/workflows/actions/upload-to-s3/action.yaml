name: Upload to S3

inputs:
  app-name:
    description: 'App name'
    required: true
    type: string
  bucket:
    description: 'S3 bucket'
    required: true
    type: string
  region:
    description: 'S3 region'
    required: false
    type: string
    default: 'ap-southeast-1'

runs:
  using: 'composite'
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_BUILDER }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_BUILDER }}
        aws-region: ${{ inputs.region }}

    - name: Upload assets to S3
      shell: bash
      run: |
        aws s3 sync ./dist/apps/${{ inputs.app-name }}/.next/static s3://${{ inputs.bucket }}/assets/${{ inputs.app-name }} --metadata cache-control=31536000

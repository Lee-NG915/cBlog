name: CD

on:
  workflow_call:
    inputs:
      base-branch:
        description: 'The base branch'
        required: false
        type: string
      app-name:
        description: 'App name'
        required: true
        type: string
      s3region:
        description: 'S3 region'
        required: true
        type: string
      bucket:
        description: 'S3 bucket'
        required: true
        type: string
      app-env:
        description: 'App environment'
        required: true
        type: string
      env:
        description: 'Environment'
        required: true
        type: string
      app-country:
        description: 'App country'
        required: true
        type: string
      upload-assets:
        description: 'Upload assets to S3'
        required: true
        type: boolean
      include-nginx:
        description: 'Include nginx'
        required: true
        type: boolean
      run-cd:
        description: 'Run CD'
        required: true
        type: boolean
    outputs:
      image-tag:
        description: 'Image tag'
        value: ${{ jobs.BuildImage.outputs.image-tag }}
env:
  REGISTRY: 825303761615.dkr.ecr.ap-southeast-1.amazonaws.com
  DEPLOYMENT_REPOSITORY: castlery/joyboy-deployment
jobs:
  BuildImage:
    if: ${{ inputs.run-cd }}
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      image-tag: ${{ steps.generate-image-info.outputs.image-tag }}
      image-version: ${{ steps.generate-image-info.outputs.image-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.base-branch || github.ref}}

      - name: Download build assets
        uses: actions/download-artifact@v4
        with:
          name: ${{inputs.app-env}}-${{ inputs.app-name }}-build-results
          path: ./dist

      - name: get affected apps version
        uses: actions/github-script@v7
        id: get-affected-project-version
        env:
          AFFECTED_APP: ${{ inputs.app-name }}
        with:
          script: |
            const affectedAppName = process.env.AFFECTED_APP;
            console.log(affectedAppName);
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('release-please/release-please-manifest.json', 'utf8'));
            return manifest['apps/' + affectedAppName];
          result-encoding: string

      - name: Generate Image Tag
        id: generate-image-info
        shell: bash
        env:
          APPLICATION_VERSION: ${{ steps.get-affected-project-version.outputs.result }}
          APP_NAME: ${{ inputs.app-name }}
          APP_ENV: ${{ inputs.app-env }}
        run: |
          SECOND_EPOCH=$(date +%s)
          IMAGE_VERSION="${APPLICATION_VERSION}-b${SECOND_EPOCH}"
          IMAGE_TAG="${APP_NAME}_${APP_ENV}_${IMAGE_VERSION}"
          echo image-tag=${IMAGE_TAG}
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image-version=${IMAGE_VERSION}" >> $GITHUB_OUTPUT

      - name: Summary
        uses: ./.github/workflows/actions/summary
        with:
          app-name: ${{ inputs.app-name }}
          app-version: ${{ steps.get-affected-project-version.outputs.result }}
          app-env: ${{ inputs.app-env }}
          image-tag: ${{ steps.generate-image-info.outputs.image-tag }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_BUILDER }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_BUILDER }}
          aws-region: ap-southeast-1

      - name: build docker image
        uses: ./.github/workflows/actions/build-docker
        with:
          app-name: ${{ inputs.app-name }}
          app-version: ${{ steps.get-affected-project-version.outputs.result }}
          app-env: ${{ inputs.app-env }}
          image-tag: ${{ steps.generate-image-info.outputs.image-tag }}
          dockerfile-path: apps/${{ inputs.app-name }}/Dockerfile-CI
          nginx-dockerfile-path: apps/${{ inputs.app-name }}/Dockerfile-nginx
          registry: ${{ env.REGISTRY }}
          build-with-assets: ${{ ! inputs.upload-assets }}
          include-nginx: ${{ inputs.include-nginx }}

  UploadToS3:
    if: ${{ inputs.upload-assets && inputs.run-cd}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout to current repo
        uses: actions/checkout@v4

      - name: Download build assets
        uses: actions/download-artifact@v4
        with:
          name: ${{inputs.app-env}}-${{ inputs.app-name }}-build-results
          path: ./dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_BUILDER }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_BUILDER }}
          aws-region: ${{ inputs.s3region }}

      - name: Upload assets to S3
        run: |
          aws s3 sync ./dist/apps/${{ inputs.app-name }}/.next/static s3://${{ inputs.bucket }}/assets/${{ inputs.app-name }}/_next/static --metadata cache-control=31536000

      - name: Upload public assets to S3
        run: |
          aws s3 sync ./dist/apps/${{ inputs.app-name }}/public s3://${{ inputs.bucket }}/assets/${{ inputs.app-name }}/public --metadata cache-control=31536000

  TriggerCD:
    runs-on: ubuntu-latest
    needs: [UploadToS3, BuildImage]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger CD
        uses: ./.github/workflows/actions/trigger-cd
        with:
          deployment-repo: ${{ env.DEPLOYMENT_REPOSITORY }}
          app-name: ${{ inputs.app-name }}
          app-env: ${{ inputs.app-env }}
          env: ${{ inputs.env }}
          app-country: ${{ inputs.app-country }}
          image-tag: ${{ needs.BuildImage.outputs.image-tag }}
          image-version: ${{ needs.BuildImage.outputs.image-version }}
          repository-token: ${{ secrets.GH_PAT_BOT }}

      - name: Checkout to current repo for post
        uses: actions/checkout@v4

      - phone
      - zipcode
      - is_temporary
      - building_type
      - is_valid
      - is_shippable
      properties:
        id:
          type: integer
          format: int32
        firstname:
          type: string
        lastname:
          type: string
        address1:
          type: string
        address2:
          type: string
        city:
          type: string
        zipcode:
          type: string
        phone:
          type: string
        alternative_phone:
          type: string
        company:
          type: string
        state:
          type: string
        state_name:
          type: string
        country:
          type: string
        street:
          type: string
        building_name:
          type: string
        street_number:
          type: string
        level:
          type: string
        flat:
          type: string
        is_manual:
          type: boolean
        is_temporary:
          type: boolean
        is_valid:
          type: boolean
        is_shippable:
          type: boolean
        building_type:
          nullable: true
          type: string
    Taxon:
      additionalProperties: false
      required:
      - name
      - permalink
      - position
      - level
      - value
      - ancestors
      properties:
        id:
          type: integer
        name:
          type: string
        permalink:
          type: string
        position:
          type: integer
          format: int32
        level:
          type: integer
          format: int32
        value:
          type: string
        ancestors:
          type: array
          items:
            type: string
    VariantCustomizationValue:
      required:
      - option_id
      - value_id
      properties:
        option_id:
          description: the ID of the option_type
          type: integer
        value_id:
          description: the ID of the option_value
          type: integer
    BundleOptionValue:
      required:
      - bundle_option_id
      - bundle_option_variant_id
      properties:
        bundle_option_id:
          description: the ID of the bundle_option
          type: integer
        bundle_option_variant_id:
          description: the ID of the variant chosen
          type: integer
    OptionType:
      required:
      - id
      - values
      - name
      - presentation
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        presentation:
          type: string
        values:

      properties:
        firstname:
          type: string
        lastname:
          type: string
        compnay:
          type: string
        phone:
          type: string
        alternative_phone:
          type: string
        address1:
          type: string
        flat:
          type: string
        level:
          type: string
        street_number:
          type: string
        street:
          type: string
        zipcode:
          type: string
        city:
          type: string
        state:
          type: string
        building_name:
          type: string
        is_manual:
          type: boolean
    Address:
      additionalProperties: false

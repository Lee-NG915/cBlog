          format: double
        lead_time:
          type: integer
          minimum: 0
        requested_quantity:
          type: integer
          minimum: 0
        available_quantity:
          type: integer
          minimum: 0
        original_amount:
          type: string
        actual_amount:
          type: string
        promotion_amount:
          type: string
        cap:
          type: integer
        estimated_delivery_days:
          type: string
        lead_time_presentation:
          type: string
    Variant:
      additionalProperties: false
      required:
      - id
      - name
      - price
      - images
      - variant_properties
      properties:
        id:
          description: ID for the variant. Each veriant is guaranteed with an ID.
          type: integer
          format: int32
        slug:
          type: string
        name:
          type: string
        sku:
          type: string
        price:
          type: string
          format: double
        list_price:
          type: string
          format: double
        tags:
          type: array
          items:
            type: string
        options_text:
          type: string
        images:
          type: array
          items:
            "$ref": "#/components/schemas/Image"
        threed_images:
          type: array
          items:
            "$ref": "#/components/schemas/ThreedImage"
        dimension_image:
          "$ref": "#/components/schemas/Image"
        variant_properties:
          "$ref": "#/components/schemas/VariantGroupProperty"
        variant_option_values:
          type: array
          description: array of VariantOptionValue that this variant has. This would
            be empty for product with no option types.
          items:
            "$ref": "#/components/schemas/VariantOptionValue"
    BundleOptionVariant:
      description: Represent a concrete variant, with limited set of static information
        about the variant. Used in bundle options.
      additionalProperties: false
      required:
      - id
      - name
      - sku
      - price
      - price_modifier
      - images
      - variant_option_values
      - tags
      - product_slug
      - product_name
      - product_taxons
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        price:
          type: string
          format: double
        price_modifier:
          type: string
          format: double
        list_price:
          type: string
          format: double
        sku:
          type: string
        images:
          type: array
          items:
            "$ref": "#/components/schemas/Image"
        variant_option_values:
          type: array
          items:
            "$ref": "#/components/schemas/VariantOptionValue"
        product_slug:
          type: string
        product_name:
          type: string
        tags:
          type: array
          items:
            type: string
        product_taxons:
          type: array
          items:
            "$ref": "#/components/schemas/Taxon"
        overlay:
          "$ref": "#/components/schemas/Image"
    ReviewBundleOptionVariant:

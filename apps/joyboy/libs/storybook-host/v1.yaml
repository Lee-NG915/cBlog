          items:
            "$ref": "#/components/schemas/SearchVariant"
    SearchVariant:
      additionalProperties: false
      required:
      - id
      - name
      - sku
      - price
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        sku:
          type: string
        price:
          type: string
          format: double
        list_price:
          type: string
          format: double
        lead_time:
          type: integer
          format: int32
        available_quantity:
          type: integer
          minimum: 0
        color:
          type: string
        is_customized:
          type: boolean
        images:
          type: array
          items:
            "$ref": "#/components/schemas/SearchImage"
    SearchImage:
      additionalProperties: false
      required:
      - id
      - mini
      - small
      - medium
      - large
      properties:
        id:
          type: integer
          format: int32

---
openapi: 3.0.1
info:
  title: Knight
  version: v1
components:
  securitySchemes:
    OrderTokenSecurity:
      name: X-Spree-Order-Token
      type: apiKey
      in: header
      scheme: basic
      description: used for guest checkout
    AccessTokenSecurity:
      name: X-Access-Token
      type: apiKey
      in: header
      scheme: basic
      description: |
        loged in user. Token can be fetched from /oauth/token path with user password.
        Token can be passed to backend as follows:
        * authorization header with bearer scheme
        * custom http header X-Access-Token
        * query parameter with name "access_token"
    GuestTokenSecurity:
      name: X-Guest-Token
      type: apiKey
      in: header
      description: |2
          guest user. Token can be generated by client. Used by binding some information to a guest user e.g. wishlist
        }
  schemas:
    GoogleFormattedPlace:
      additionalProperties: false
      required:
      - address1
      - city
      - zipcode
      - state_name
      - street
      - street_number
      properties:
        address1:
          type: string
        city:
          type: string
        zipcode:
          type: string
        state_name:
          type: string
        street:
          type:
          - string
          - 
        street_number:
          type:
          - string
          - 
    GooglePlace:
      additionalProperties: false
      required:
      - description
      - google_place_id
      properties:
        description:
          type: string
        google_place_id:
          type: string
    GiftPool:
      type: object
      additionalProperties: false
      required:
      - id
      - is_eligible
      - gifts
      properties:
        id:
          type: integer
        is_eligible:
          type: boolean
        min_spend:
          type: string
        gifts:
          type: array
          items:
            "$ref": "#/components/schemas/GiftItem"
    GiftItem:
      type: object
      additionalProperties: false
      required:
      - id
      - quantity
      - state
      - variant
      properties:
        id:
          type: integer
        quantity:
          type: integer
        state:
          type: string
          enum:
          - IN_STOCK
          - OUT_OF_STOCK
          - UNAVAILABLE
        variant:
          type: object
          additionalProperties: false
          required:
          - id
          - sku
          - product_id
          - product_name
          - product_slug
          - price
          - list_price
          properties:
            id:
              type: integer
            sku:
              type: string
            product_id:
              type: integer
            product_name:
              type: string
            product_slug:
              type: string
            price:
              type: string
            list_price:
              type: string
            images:
              type: array
              items:
                "$ref": "#/components/schemas/VariantCloudinaryImage"
            variant_option_values:
              type: array
              description: array of VariantOptionValue that this variant has. This
                would be empty for product with no option types.
              items:
                "$ref": "#/components/schemas/VariantOptionValue"
    Swatch:
      type: array
      items:
        type: object
        additionalProperties: false
        required:
        - id
        - name
        - slug
        - description
        - product_properties
        - variants
        properties:
          id:
            type: integer
          name:
            type: string
          slug:
            type: string
          description:
            type: string
          presentation:
            type: string
          product_properties:
            type: array
            items:
              "$ref": "#/components/schemas/ProductProperty"
          variants:
            type: array
            items:
              type: object
              additionalProperties: false
              required:
              - id
              - name
              - sku
              - product_id
              - is_customized
              - presentation
              - images
              - variant_properties
              properties:
                id:
                  type: integer
                name:
                  type: string
                sku:
                  type: string
                product_id:
                  type: integer
                is_customized:
                  type: boolean
                presentation:
                  type: string
                images:
                  type: array
                  items:
                    "$ref": "#/components/schemas/VariantCloudinaryImage"
                variant_properties:
                  type: array
                  items:
                    "$ref": "#/components/schemas/VariantPropertyValue"
    ProductProperty:
      additionalProperties: false
      required:
      - name
      - presentation
      - value
      - is_public
      - is_private
      properties:
        name:
          type: string
        presentation:
          type: string
        value:
          type: string
        explanation:
          nullable: true
          type: string
        is_public:
          type: boolean
        is_private:
          type: boolean
    VariantPropertyValue:
      additionalProperties: false
      required:
      - id
      - value
      - property_id
      - property_name
      - presentation
      - explanation
      properties:
        id:
          type: integer
        property_id:
          type: integer
        property_name:
          type: string
        value:
          type: string
        presentation:
          type:
          - string
          - 'null'
        explanation:
          type:
          - string
          - 'null'
    VariantCloudinaryImage:
      additionalProperties: false
      required:
      - position
      - type
      - links
      properties:
        position:
          type: integer
        path:
          type: string
        type:
          type: string
        links:
          type: object
          additionalProperties: false
          required:
          - feed
          - large
          - large_gray
          properties:
            feed:
              type: string
            large:
              type: string
            large_gray:
              type: string
    SearchHint:
      required:
      - name
      - slug
      - type
      - name_highlight
      properties:
        name:
          type: string
        name_highlight:
          description: the name with highlight, can be used for display directly
          type: string
        slug:
          type: string
        type:
          type: string
          enum:
          - category
          - product
          - collection
        default_taxon:
          type: string
    AddressSearch:
      additionalProperties: false
      required:
      - id
      - street
      - zipcode
      properties:
        id:
          type: string
        building_name:
          type: string
        flat:
          description: Applicable to AU only
          type: string
        level:
          description: Applicable to AU only
          type: string
        street_number:
          type: string
        street:
          type: string
        city:
          description: Applicable to AU only
          type: string
        state:
          description: Applicable to AU only
          type: string
        zipcode:
          type: string
        latitude:
          type: string
        longitude:
          type: string
    CitySearch:
      additionalProperties: false
      required:
      - city
      - state
      - zipcode
      properties:
        city:
          type: string
        state:
          type: string
        zipcode:
          type: string
    AddressRequest:
      required:
